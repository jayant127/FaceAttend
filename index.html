<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="index.css">
    <title>FaceAttend - Login</title>
</head>

<body>
    <!-- Background Video -->
    <video autoplay muted loop id="bg-video">
        <source src="assets/BgVideo.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <!-- Dark Overlay for better contrast -->
    <div class="overlay"></div>

    <div class="Login">
        <form action="/login" method="POST">
            <div class="logo-container">
                <img src="assets\Logo.png" class="logo">
                <h2>FaceAttend</h2>
            </div>

            <p class="subtitle">Welcome back! Please login to your account.</p>

            <!-- Success Banner -->
            <div id="success-message" class="success-banner" style="display: none; color: #00ff87; background: rgba(0, 255, 135, 0.1); border: 1px solid rgba(0, 255, 135, 0.25); padding: 12px; border-radius: 12px; margin-bottom: 25px; text-align: center; font-size: 14px; backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
                Registration successful! You can now log in.
            </div>

            <!-- Error Banner -->
            <div id="error-message" class="error-banner" style="display: none; color: #ff5252; background: rgba(255, 82, 82, 0.1); border: 1px solid rgba(255, 82, 82, 0.25); padding: 12px; border-radius: 12px; margin-bottom: 25px; text-align: center; font-size: 14px; backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); animation: shake 0.5s ease-in-out;">
                Invalid username or password! Please try again.
            </div>

            <div class="Input">
                <input id="Username" type="text" name="username" placeholder="Username" required>
            </div>
            <div class="Input">
                <input id="Password" type="password" name="password" placeholder="Password" required>
            </div>

            <div class="options">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <div class="Submit">
                <button id="SubmitBtn" type="submit">Log In</button>
            </div>
            <div class="Signup">
                <p>Don't have an account? <a href="/signup">Sign up</a></p>
            </div>
        </form>
    </div>

    <!-- Error shake keyframes & simple client-side error check -->
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'invalid') {
            document.getElementById('error-message').style.display = 'block';
            // Clear parameter from URL bar for clean refreshing
            window.history.replaceState({}, document.title, window.location.pathname);
        } else if (urlParams.get('success') === 'registered') {
            document.getElementById('success-message').style.display = 'block';
            // Clear parameter from URL bar for clean refreshing
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>
</body>

</html>
