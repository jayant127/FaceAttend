<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="index.css">
    <title>FaceAttend - Sign Up</title>
</head>

<body>
    <!-- Background Video -->
    <video autoplay muted loop id="bg-video">
        <source src="assets/BgVideo.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <!-- Dark Overlay for better contrast -->
    <div class="overlay"></div>

    <div class="Login">
        <form action="/signup" method="POST">
            <div class="logo-container">
                <img src="assets\Logo.png" class="logo">
                <h2>FaceAttend</h2>
            </div>

            <p class="subtitle">Create your account to get started.</p>

            <!-- Error Banners -->
            <div id="error-exists" class="error-banner" style="display: none; color: #ff5252; background: rgba(255, 82, 82, 0.1); border: 1px solid rgba(255, 82, 82, 0.25); padding: 12px; border-radius: 12px; margin-bottom: 25px; text-align: center; font-size: 14px; backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); animation: shake 0.5s ease-in-out;">
                Username already exists! Please choose another.
            </div>

            <div id="error-mismatch" class="error-banner" style="display: none; color: #ff5252; background: rgba(255, 82, 82, 0.1); border: 1px solid rgba(255, 82, 82, 0.25); padding: 12px; border-radius: 12px; margin-bottom: 25px; text-align: center; font-size: 14px; backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); animation: shake 0.5s ease-in-out;">
                Passwords do not match! Please try again.
            </div>

            <div id="error-invalid" class="error-banner" style="display: none; color: #ff5252; background: rgba(255, 82, 82, 0.1); border: 1px solid rgba(255, 82, 82, 0.25); padding: 12px; border-radius: 12px; margin-bottom: 25px; text-align: center; font-size: 14px; backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); animation: shake 0.5s ease-in-out;">
                Invalid fields. Please try again.
            </div>

            <div class="Input">
                <input id="Username" type="text" name="username" placeholder="Username" required>
            </div>
            <div class="Input">
                <input id="Password" type="password" name="password" placeholder="Password" required>
            </div>
            <div class="Input">
                <input id="ConfirmPassword" type="password" name="confirm_password" placeholder="Confirm Password" required>
            </div>

            <div class="Submit" style="margin-top: 15px;">
                <button id="SubmitBtn" type="submit">Sign Up</button>
            </div>
            <div class="Signup">
                <p>Already have an account? <a href="/">Log In</a></p>
            </div>
        </form>
    </div>

    <!-- Error shake keyframes & simple client-side error check -->
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error === 'exists') {
            document.getElementById('error-exists').style.display = 'block';
            window.history.replaceState({}, document.title, window.location.pathname);
        } else if (error === 'mismatch') {
            document.getElementById('error-mismatch').style.display = 'block';
            window.history.replaceState({}, document.title, window.location.pathname);
        } else if (error === 'invalid') {
            document.getElementById('error-invalid').style.display = 'block';
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>
</body>

</html>
